name: Question
description: Ask a question about usage, behavior, or design
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reaching out. Please include enough context so maintainers can help quickly."
  - type: textarea
    id: summary
    attributes:
      label: Question summary
      description: What do you want to know?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to do and what have you already tried?
      placeholder: |
        - Goal:
        - Current behavior:
        - What I tried:
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: Relevant links or files
      description: Related docs, issues, PRs, code snippets, or screenshots
  - type: dropdown
    id: project_type
    attributes:
      label: Type
      options:
        - Usage question
        - Design discussion
        - Troubleshooting
        - Other
    validations:
      required: true
