name: secrets-scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # 他 repo から `uses: thinkyou0714/.github/.github/workflows/secrets-scan.yml@<tag|sha>`
  # で呼べる reusable workflow としても公開する
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PR コメント機能は使わない方針（top-level permissions を contents: read に保つため。
          # 有効化するなら job に pull-requests: write が必要）
          GITLEAKS_ENABLE_COMMENTS: "false"
