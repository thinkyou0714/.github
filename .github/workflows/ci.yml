name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Verify governance files
        shell: bash
        run: |
          test -f .github/CODEOWNERS
          test -f .github/dependabot.yml
          test -f .github/workflows/dependency-review.yml
          test -f .github/workflows/secrets-scan.yml
