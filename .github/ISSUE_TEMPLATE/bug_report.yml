name: Bug report
description: Report a problem that needs to be fixed
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a report.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Describe the issue
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Project version, OS, runtime
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
  - type: checkboxes
    id: checked
    attributes:
      label: Pre-submit checklist
      options:
        - label: I searched existing issues/discussions for duplicates.
          required: true
